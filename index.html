<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RNHS WEBPAGE</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- AUTH PAGE -->
<div id="authPage">
  <div class="box">
    <div id="loginForm">
      <img src="images/logo.png" class="logo">
      <h2>ROSALES NATIONAL HIGHSCHOOL</h2>
      <p>Login to continue</p>
      <input type="text" placeholder="Username" id="loginUser">
      <input type="password" placeholder="Password" id="loginPass">
      <button onclick="login()">Login</button>
      <div class="switch">
        Don't have an account?
        <a onclick="showSignup()">Sign Up</a>
      </div>
    </div>

    <div id="signupForm" class="hidden">
      <img src="images/logo.png" class="logo">
      <h2>Create Account</h2>
      <input type="text" placeholder="Full Name">
      <input type="text" placeholder="Username">
      <input type="email" placeholder="Email">
      <input type="password" placeholder="Password" id="pass">
      <input type="password" placeholder="Confirm Password" id="confirm">
      <button onclick="signup()">Sign Up</button>
      <div class="switch">
        Already have an account?
        <a onclick="showLogin()">Login</a>
      </div>
    </div>
  </div>
</div>

<!-- HOME PAGE -->
<div id="homePage">

<header>
  <div class="header-content">
    <h1>Rosales National High School</h1>
  </div>
  <nav>
    <a href="#" onclick="showSection('home')">Home</a>
    <a href="#" onclick="showSection('strands')">Strands</a>
    <a href="#" onclick="showSection('mission')">Mission & Vision</a>
    <a href="#" onclick="showSection('about')">About</a>
    <a href="#" onclick="showSection('facilities')">Facilities</a>
    <a href="#" onclick="showSection('events')">Events</a>
    <a href="#" onclick="showSection('map')">School Map</a>
    <a href="#" onclick="logout()">Logout</a>
  </nav>
</header>

<!-- All Sections Here (keep your sections same as before) -->

</div>

<script src="script.js"></script>
</body>
</html>
